services:
  - type: web
    name: skasastudios
    env: node
    branch: main
    plan: free

    buildCommand: npm install && npm run build
    startCommand: npm run start

    autoDeploy: true

    envVars:
      - key: NODE_VERSION
        value: 20

      - key: MONGODB_URI
        sync: true

      - key: RAZORPAY_KEY_ID
        sync: true

      - key: RAZORPAY_KEY_SECRET
        sync: true

      - key: CLOUDINARY_CLOUD_NAME
        sync: true

      - key: CLOUDINARY_API_KEY
        sync: true

      - key: CLOUDINARY_API_SECRET
        sync: true

      - key: ADMIN_SECRET
        sync: true

      - key: EMAIL_SERVICE
        sync: true

      - key: EMAIL_USER
        sync: true

      - key: EMAIL_PASSWORD
        sync: true

      - key: EMAIL_FROM
        sync: true

      - key: ADMIN_EMAIL
        sync: true

      - key: TWILIO_ACCOUNT_SID
        sync: true

      - key: TWILIO_AUTH_TOKEN
        sync: true

      - key: TWILIO_WHATSAPP_FROM
        sync: true

      - key: ADMIN_WHATSAPP_NUMBER
        sync: true

      - key: NEXT_PUBLIC_APP_URL
        sync: true